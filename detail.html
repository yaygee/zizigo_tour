<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZIZIGO TOUR 상세 정보">
    <title>ZIZIGO TOUR - 상세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #1a1a1a;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            color: #333;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .detail-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10vh;
            position: relative;
            background-image: url('images/detail-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #e8e8e8;
            margin: 0 auto;
        }

        .back-btn-top {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow:
                0 4px 0 #000,
                0 6px 10px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }

        .back-btn-top:hover {
            transform: translateY(2px);
            box-shadow:
                0 2px 0 #000,
                0 4px 8px rgba(0, 0, 0, 0.3);
            background: #f5f5f5;
        }

        .back-btn-top:active {
            transform: translateY(4px);
            box-shadow:
                0 0px 0 #000,
                0 2px 5px rgba(0, 0, 0, 0.3);
        }


        .button-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 80%;
            width: 320px;
            z-index: 1;
        }

        .vintage-btn {
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow:
                0 5px 0 #000,
                0 8px 15px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .vintage-btn:hover {
            transform: translateY(2px);
            box-shadow:
                0 3px 0 #000,
                0 5px 10px rgba(0, 0, 0, 0.3);
            background: #f5f5f5;
        }

        .vintage-btn:active {
            transform: translateY(5px);
            box-shadow:
                0 0px 0 #000,
                0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* 팝업 스타일 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup-content {
            background: #fff;
            border-radius: 15px;
            border: 4px solid #333;
            padding: 30px 25px;
            max-width: 85%;
            width: 420px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }

        .popup-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #000;
            letter-spacing: 1px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            color: #000;
            transform: scale(1.2);
        }

        .popup-body {
            color: #333;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .popup-message {
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.7;
            color: #555;
        }

        .payment-info {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .payment-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.9rem;
        }

        .payment-info-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .payment-label {
            font-weight: bold;
            color: #333;
        }

        .payment-value {
            color: #666;
            text-align: right;
        }

        @media (max-width: 600px) {
            .back-btn-top {
                padding: 8px 16px;
                font-size: 0.8rem;
                top: 15px;
                left: 15px;
            }

            .button-wrapper {
                max-width: 90%;
                width: 90%;
            }

            .vintage-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            .popup-content {
                padding: 25px 20px;
                width: 90%;
            }

            .popup-title {
                font-size: 1.1rem;
            }

            .close-btn {
                font-size: 1.5rem;
            }

            .popup-message {
                font-size: 0.9rem;
                margin-bottom: 25px;
            }

            .payment-info {
                padding: 15px;
            }

            .payment-info-item {
                font-size: 0.85rem;
                flex-direction: column;
                gap: 5px;
            }

            .payment-value {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <button class="back-btn-top" onclick="goToHome()">← 뒤로가기</button>

        <div class="button-wrapper">
            <button class="vintage-btn" onclick="goToSchedule()">투어 일정표 보기</button>
            <button class="vintage-btn" onclick="openPaymentPopup()">투어비 입금하기</button>
        </div>
    </div>

    <!-- 투어비 입금 팝업 -->
    <div class="popup-overlay" id="paymentPopup">
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-title">투어비 입금하기</div>
                <button class="close-btn" onclick="closePaymentPopup()">&times;</button>
            </div>
            <div class="popup-body">
                <div class="popup-message">
                    여러분들이 떠나게 될 결혼행 투어,<br>
                    평생 기억에 남을 특별한 추억이 될 거예요.
                </div>
                <div class="payment-info">
                    <div class="payment-info-item">
                        <span class="payment-label">입금 금액</span>
                        <span class="payment-value">000,000원</span>
                    </div>
                    <div class="payment-info-item">
                        <span class="payment-label">은행</span>
                        <span class="payment-value">○○은행</span>
                    </div>
                    <div class="payment-info-item">
                        <span class="payment-label">계좌번호</span>
                        <span class="payment-value">0000-0000-0000</span>
                    </div>
                    <div class="payment-info-item">
                        <span class="payment-label">예금주</span>
                        <span class="payment-value">홍길동</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goToHome() {
            window.location.href = 'index.html';
        }

        function openPaymentPopup() {
            document.getElementById('paymentPopup').classList.add('show');
        }

        function closePaymentPopup() {
            document.getElementById('paymentPopup').classList.remove('show');
        }

        function goToSchedule() {
            window.location.href = 'schedule.html';
        }

        // ESC 키로 팝업 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePaymentPopup();
            }
        });

        // 오버레이 클릭 시 팝업 닫기
        document.getElementById('paymentPopup').addEventListener('click', function(e) {
            if (e.target === this) {
                closePaymentPopup();
            }
        });
    </script>
</body>
</html>
