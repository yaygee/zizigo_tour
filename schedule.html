<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZIZIGO TOUR 일정표">
    <title>ZIZIGO TOUR - 일정표</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #1a1a1a;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            color: #333;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .schedule-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding: 20px;
            background-color: #e8e8e8;
            margin: 0 auto;
            position: relative;
        }

        .header {
            margin-bottom: 40px;
        }

        .back-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow:
                0 4px 0 #000,
                0 6px 10px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn:hover {
            transform: translateY(2px);
            box-shadow:
                0 2px 0 #000,
                0 4px 8px rgba(0, 0, 0, 0.3);
            background: #f5f5f5;
        }

        .back-btn:active {
            transform: translateY(4px);
            box-shadow:
                0 0px 0 #000,
                0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .content-area {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .placeholder {
            text-align: center;
            opacity: 0.3;
            margin-top: 50px;
        }

        @media (max-width: 600px) {
            .back-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }

            .page-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="schedule-container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">← 뒤로가기</button>
        </div>
        <h1 class="page-title">투어 일정표</h1>

        <div class="content-area">
            <div class="placeholder">
                <!-- 일정표 내용은 나중에 추가 -->
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'detail.html';
        }
    </script>
</body>
</html>
