<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="파티 초대장">
    <title>파티 초대장</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .invitation-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .header p {
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .info-item strong {
            min-width: 100px;
            color: #2c3e50;
        }

        .rsvp-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-yes {
            background: #2ecc71;
            color: white;
        }

        .btn-yes:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .btn-no {
            background: #e74c3c;
            color: white;
        }

        .btn-no:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #7f8c8d;
        }

        @media (max-width: 600px) {
            .invitation-card {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .rsvp-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="invitation-card">
            <div class="header">
                <h1>🎉 파티에 초대합니다!</h1>
                <p>함께 즐거운 시간을 보내요</p>
            </div>

            <div class="section">
                <h2>📅 일정</h2>
                <div class="info-item">
                    <strong>날짜:</strong>
                    <span>2024년 12월 25일 (수)</span>
                </div>
                <div class="info-item">
                    <strong>시간:</strong>
                    <span>저녁 7시</span>
                </div>
            </div>

            <div class="section">
                <h2>📍 장소</h2>
                <div class="info-item">
                    <strong>주소:</strong>
                    <span>서울특별시 강남구 테헤란로 123</span>
                </div>
            </div>

            <div class="section">
                <h2>👔 드레스 코드</h2>
                <div class="info-item">
                    <span>편안한 캐주얼</span>
                </div>
            </div>

            <div class="section">
                <h2>📝 안내사항</h2>
                <div class="info-item">
                    <span>주차 가능 / 음료 및 간식 제공</span>
                </div>
            </div>

            <div class="section">
                <h2>💌 참석 여부</h2>
                <div class="rsvp-buttons">
                    <button class="btn btn-yes" onclick="handleRSVP('yes')">참석할게요! ✓</button>
                    <button class="btn btn-no" onclick="handleRSVP('no')">아쉽지만 불참 ✗</button>
                </div>
                <div id="message" class="message"></div>
            </div>
        </div>

        <footer>
            <p>여러분의 참석을 기다립니다! 💝</p>
        </footer>
    </div>

    <script>
        function handleRSVP(response) {
            const messageEl = document.getElementById('message');

            if (response === 'yes') {
                messageEl.textContent = '참석 의사를 확인했습니다! 당일 뵙겠습니다 😊';
                messageEl.className = 'message success show';
            } else {
                messageEl.textContent = '다음 기회에 꼭 함께해요!';
                messageEl.className = 'message info show';
            }

            // 실제 서비스에서는 여기서 서버로 RSVP 정보를 전송할 수 있습니다
            console.log('RSVP:', response);
        }
    </script>
</body>
</html>
