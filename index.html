<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZIZIGO TOUR 결혼행 초대장">
    <title>ZIZIGO TOUR 초대장</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        .main-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/main-home.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .invitation-box {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow:
                0 8px 16px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.5);
            max-width: 90%;
            width: 400px;
            text-align: center;
        }

        .invitation-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .vintage-btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow:
                0 5px 0 #000,
                0 8px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vintage-btn:hover {
            transform: translateY(2px);
            box-shadow:
                0 3px 0 #000,
                0 5px 10px rgba(0, 0, 0, 0.3);
            background: #f5f5f5;
        }

        .vintage-btn:active {
            transform: translateY(5px);
            box-shadow:
                0 0px 0 #000,
                0 2px 5px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            .invitation-box {
                padding: 30px 20px;
                width: 95%;
            }

            .invitation-text {
                font-size: 1rem;
                line-height: 1.6;
            }

            .button-container {
                flex-direction: column;
                gap: 12px;
            }

            .vintage-btn {
                width: 100%;
                padding: 15px 20px;
                font-size: 1rem;
            }
        }

        @media (max-width: 400px) {
            .invitation-text {
                font-size: 0.95rem;
            }

            .vintage-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="invitation-box">
            <div class="invitation-text">
                결혼행 초대장이 도착했어요!<br>
                초대를 수락하시겠어요?
            </div>
            <div class="button-container">
                <button class="vintage-btn btn-yes" onclick="handleAccept('yes')">네</button>
                <button class="vintage-btn btn-accept" onclick="handleAccept('accept')">수락할게요</button>
            </div>
        </div>
    </div>

    <script>
        function handleAccept(response) {
            // 상세페이지로 이동 (아직 생성 전이므로 임시 알림)
            console.log('Response:', response);
            alert('곧 상세페이지로 이동합니다!');
            // 추후 페이지 이동: window.location.href = 'detail.html';
        }
    </script>
</body>
</html>
