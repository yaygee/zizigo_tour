<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZIZIGO TOUR 결혼행 초대장">
    <title>ZIZIGO TOUR 초대장</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #1a1a1a;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/main-home.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            position: relative;
            margin: 0 auto;
        }

        .door-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 200px;
            cursor: pointer;
            z-index: 2;
            transition: opacity 0.3s ease;
        }

        .door-area:hover {
            opacity: 0.8;
        }

        .knock-text {
            position: absolute;
            top: calc(50% + 120px);
            left: 50%;
            transform: translateX(-50%);
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            z-index: 1;
            background: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            border: 3px solid #000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            animation: blink 2s ease-in-out infinite;
        }

        .knock-text::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 15px solid #000;
            transform: rotate(-30deg);
        }

        .knock-text::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 22px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 12px solid #fff;
            transform: rotate(-30deg);
            z-index: 1;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .invitation-box {
            position: absolute;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px 20px;
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow:
                0 8px 16px rgba(0, 0, 0, 0.3),
                inset 0 2px 4px rgba(255, 255, 255, 0.5);
            max-width: 80%;
            width: 320px;
            text-align: center;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .invitation-box.show {
            display: block;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .invitation-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .vintage-btn {
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow:
                0 5px 0 #000,
                0 8px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vintage-btn:hover {
            transform: translateY(2px);
            box-shadow:
                0 3px 0 #000,
                0 5px 10px rgba(0, 0, 0, 0.3);
            background: #f5f5f5;
        }

        .vintage-btn:active {
            transform: translateY(5px);
            box-shadow:
                0 0px 0 #000,
                0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* 문 열림 애니메이션 레이어 */
        .door-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            z-index: 9999;
            display: none;
        }

        @media (max-width: 600px) {
            .door-area {
                width: 100px;
                height: 150px;
            }

            .knock-text {
                font-size: 1rem;
                top: calc(50% + 90px);
            }

            .invitation-box {
                padding: 20px 15px;
                width: 90%;
                bottom: 8vh;
            }

            .invitation-text {
                font-size: 0.95rem;
            }

            .button-container {
                flex-direction: column;
                gap: 12px;
            }

            .vintage-btn {
                width: 100%;
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .knock-text {
                font-size: 0.9rem;
            }

            .invitation-text {
                font-size: 0.85rem;
            }

            .vintage-btn {
                padding: 10px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="door-area" id="doorArea" onclick="knockDoor()"></div>
        <div class="knock-text" id="knockText">노크해주세요!</div>

        <div class="invitation-box" id="invitationBox">
            <div class="invitation-text">
                결혼행 초대장이 도착했어요!<br>
                초대를 수락하시겠어요?
            </div>
            <div class="button-container">
                <button class="vintage-btn" onclick="handleAccept()">네</button>
                <button class="vintage-btn" onclick="handleAccept()">수락할게요</button>
            </div>
        </div>
    </div>

    <div class="door-animation" id="doorAnimation"></div>

    <script>
        function knockDoor() {
            const invitationBox = document.getElementById('invitationBox');
            const knockText = document.getElementById('knockText');
            const doorArea = document.getElementById('doorArea');

            // 노크 텍스트와 문 클릭 영역 숨기기
            knockText.style.display = 'none';
            doorArea.style.display = 'none';

            // 팝업 표시
            invitationBox.classList.add('show');
        }

        function handleAccept() {
            // 팝업 숨기기
            const invitationBox = document.getElementById('invitationBox');
            invitationBox.style.display = 'none';

            // 문 열림 애니메이션 시작
            startDoorAnimation();
        }

        // 이미지 미리 로드
        const doorImages = [
            'images/door-1.png',
            'images/door-2.png',
            'images/door-3.png',
            'images/door-4.jpg',
            'images/door-5.jpg'
        ];

        // 페이지 로드 시 이미지 미리 로드
        window.addEventListener('load', function() {
            doorImages.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        });

        function startDoorAnimation() {
            const doorAnimation = document.getElementById('doorAnimation');
            let currentIndex = 0;
            doorAnimation.style.display = 'block';

            function showNextImage() {
                if (currentIndex < doorImages.length) {
                    doorAnimation.style.backgroundImage = `url('${doorImages[currentIndex]}')`;
                    currentIndex++;
                    setTimeout(showNextImage, 300); // 0.3초 간격
                } else {
                    // 모든 이미지 표시 후 상세페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'detail.html';
                    }, 300);
                }
            }

            showNextImage();
        }
    </script>
</body>
</html>
