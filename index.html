<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ZIZIGO TOUR 결혼행 초대장">
    <title>ZIZIGO TOUR 초대장</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: #1a1a1a;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/main-home.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            position: relative;
            margin: 0 auto;
        }

        .door-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 200px;
            cursor: pointer;
            z-index: 2;
            transition: opacity 0.3s ease;
        }

        .door-area:hover {
            opacity: 0.8;
        }

        .knock-text {
            position: absolute;
            top: calc(50% + 140px);
            left: 50%;
            transform: translateX(-50%);
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            z-index: 1;
            background: #fff;
            padding: 12px 20px;
            border-radius: 20px;
            border: 3px solid #000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            animation: fadeInSmooth 1s ease-out 1s forwards, float 3s ease-in-out 1s infinite;
        }

        @keyframes fadeInSmooth {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-6px);
            }
        }

        .knock-text::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 15px solid #000;
        }

        .knock-text::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 12px solid #fff;
            z-index: 1;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 25px;
            border: 4px solid #333;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            max-width: 85%;
            width: 320px;
            text-align: center;
            animation: popupFadeIn 0.3s ease;
        }

        .popup-box.large {
            width: 400px;
            padding: 40px 25px;
        }

        @keyframes popupFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .popup-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .popup-text.large {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .popup-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .vintage-btn {
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #000;
            background: #fff;
            border: 3px solid #000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow:
                0 5px 0 #000,
                0 8px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vintage-btn:hover {
            transform: translateY(2px);
            box-shadow:
                0 3px 0 #000,
                0 5px 10px rgba(0, 0, 0, 0.3);
            background: #f5f5f5;
        }

        .vintage-btn:active {
            transform: translateY(5px);
            box-shadow:
                0 0px 0 #000,
                0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* 문 열림 애니메이션 레이어 */
        .door-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
            z-index: 9999;
            display: none;
        }

        @media (max-width: 600px) {
            .door-area {
                width: 100px;
                height: 150px;
            }

            .knock-text {
                font-size: 0.85rem;
                top: calc(50% + 100px);
                padding: 10px 16px;
            }

            .popup-box {
                width: 90%;
                padding: 25px 20px;
            }

            .popup-box.large {
                width: 92%;
                padding: 30px 22px;
            }

            .popup-text {
                font-size: 1rem;
            }

            .popup-text.large {
                font-size: 0.95rem;
            }

            .popup-buttons {
                gap: 10px;
            }

            .vintage-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .knock-text {
                font-size: 0.9rem;
            }

            .invitation-text {
                font-size: 0.85rem;
            }

            .vintage-btn {
                padding: 10px 15px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="door-area" id="doorArea" onclick="knockDoor()"></div>
        <div class="knock-text" id="knockText">맞다면, 문을 열고<br>들어가보세요</div>

    </div>

    <!-- 첫 번째 팝업 -->
    <div class="popup-overlay" id="popup1">
        <div class="popup-box">
            <div class="popup-text">
                들어가시겠습니까?
            </div>
            <div class="popup-buttons">
                <button class="vintage-btn" onclick="closePopup1()">아니요</button>
                <button class="vintage-btn" onclick="showPopup2()">네</button>
            </div>
        </div>
    </div>

    <!-- 두 번째 팝업 -->
    <div class="popup-overlay" id="popup2">
        <div class="popup-box large">
            <div class="popup-text large">
                단, 한번 들어가면 나갈 수 없습니다.<br>그래도 들어가시겠어요?
            </div>
            <div class="popup-buttons">
                <button class="vintage-btn" onclick="goBackToMain()">아니요</button>
                <button class="vintage-btn" onclick="enterDoor()">네</button>
            </div>
        </div>
    </div>

    <div class="door-animation" id="doorAnimation"></div>

    <script>
        function knockDoor() {
            const popup1 = document.getElementById('popup1');
            popup1.classList.add('show');
        }

        function closePopup1() {
            const popup1 = document.getElementById('popup1');
            popup1.classList.remove('show');
        }

        function showPopup2() {
            const popup1 = document.getElementById('popup1');
            const popup2 = document.getElementById('popup2');

            popup1.classList.remove('show');
            setTimeout(() => {
                popup2.classList.add('show');
            }, 200);
        }

        function goBackToMain() {
            window.location.reload();
        }

        function enterDoor() {
            const popup2 = document.getElementById('popup2');
            popup2.classList.remove('show');

            setTimeout(() => {
                startDoorAnimation();
            }, 200);
        }

        // 이미지 미리 로드
        const doorImages = [
            'images/door-1.png',
            'images/door-2.png',
            'images/door-3.png',
            'images/door-4.jpg',
            'images/door-5.jpg'
        ];

        // 페이지 로드 시 이미지 미리 로드
        window.addEventListener('load', function() {
            doorImages.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        });

        function startDoorAnimation() {
            const doorAnimation = document.getElementById('doorAnimation');
            let currentIndex = 0;
            doorAnimation.style.display = 'block';

            function showNextImage() {
                if (currentIndex < doorImages.length) {
                    doorAnimation.style.backgroundImage = `url('${doorImages[currentIndex]}')`;
                    currentIndex++;
                    setTimeout(showNextImage, 300); // 0.3초 간격
                } else {
                    // 모든 이미지 표시 후 상세페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'detail.html';
                    }, 300);
                }
            }

            showNextImage();
        }
    </script>
</body>
</html>
